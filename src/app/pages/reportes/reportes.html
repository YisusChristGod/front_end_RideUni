<div class="container">

  <h1>Sistema de Reportes</h1>
  <p class="subtitle">Incidencias reportadas del servicio</p>

  <div class="layout">

    <!-- FORMULARIO -->
    <div class="formulario">

      <h2>Generar Reporte</h2>

      <textarea
        [(ngModel)]="nuevoReporte"
        placeholder="Describe el problema... (Ej: el camión llegó tarde, no pasó, etc)"
      ></textarea>

      <button (click)="agregarReporte()">
        Enviar Reporte
      </button>

    </div>

    <!-- LISTA -->
    <div class="lista">

      <h2>Reportes Recientes</h2>

      <div class="card" *ngFor="let r of reportes">

        <div class="icon">📄</div>

        <div class="contenido">
          <p class="desc">{{ r.descripcion }}</p>

          <small class="fecha">
            {{ r.fecha | date:'dd/MMM/yyyy, HH:mm' }}
          </small>
        </div>

      </div>

    </div>

  </div>

</div>
